<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Générer les icônes Al-Huda</title></head>
<body>
<p>Cliquez pour télécharger les icônes PNG :</p>
<button onclick="generate(192)">Télécharger icon-192.png</button>
<button onclick="generate(512)">Télécharger icon-512.png</button>
<canvas id="c"></canvas>
<script>
function generate(size) {
  const canvas = document.getElementById('c');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Fond vert arrondi
  const r = size * 0.2;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#1B6B3A';
  ctx.fill();

  // Lettre arabe ه
  ctx.fillStyle = '#C9A84C';
  ctx.font = `bold ${size * 0.6}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('ه', size / 2, size / 2 + size * 0.05);

  // Téléchargement
  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
