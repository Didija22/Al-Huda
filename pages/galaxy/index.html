<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Al-Huda — Galaxie des 114 Sourates. Explorez le Coran sous forme de galaxie interactive : zoomez, naviguez et découvrez chaque sourate comme une planète." />
  <title>Galaxie des Sourates — Al-Huda | الهُدى</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231B6B3A'/><text y='.9em' font-size='70' font-family='serif' x='50%' text-anchor='middle' fill='%23C9A84C'>ه</text></svg>" />

  <!-- Anti-flash dark mode -->
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('al-huda-theme') || 'light');</script>

  <!-- PWA -->
  <link rel="manifest" href="../../manifest.json" />
  <meta name="theme-color" content="#050709" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Al-Huda" />
  <link rel="apple-touch-icon" href="../../assets/icons/icon-192.png" />

  <!-- Open Graph -->
  <meta property="og:title" content="Galaxie des Sourates — Al-Huda" />
  <meta property="og:description" content="Explorez les 114 sourates du Saint Coran comme une galaxie interactive. Chaque planète est une sourate." />
  <meta property="og:type" content="website" />

  <!-- Fonts (Poppins + Amiri pour l'arabe) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050709;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
      touch-action: none;
      user-select: none;
    }

    /* ===== CANVAS ===== */
    #galaxy-canvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      cursor: grab;
    }
    #galaxy-canvas:active { cursor: grabbing; }

    /* ===== OVERLAY COMMUN ===== */
    .gal-overlay {
      position: fixed;
      z-index: 10;
      pointer-events: none;
    }
    .gal-overlay * { pointer-events: auto; }

    /* ===== TOPBAR ===== */
    .gal-topbar {
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(to bottom, rgba(5,7,9,0.85) 0%, rgba(5,7,9,0) 100%);
      gap: 12px;
    }

    /* Bouton retour */
    .gal-back {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.85);
      padding: 7px 14px;
      border-radius: 50px;
      font-size: 0.82rem;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      text-decoration: none;
      backdrop-filter: blur(8px);
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .gal-back:hover { background: rgba(255,255,255,0.15); color: #fff; }

    /* Titre central */
    .gal-title {
      flex: 1;
      text-align: center;
    }
    .gal-title h1 {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.03em;
      line-height: 1.2;
    }
    .gal-title .gal-subtitle {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.45);
      margin-top: 1px;
    }

    /* Bouton pause */
    .gal-pause-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.75);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 0.9rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .gal-pause-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

    /* ===== PANNEAU GAUCHE : légende ===== */
    .gal-legend {
      top: 50%;
      left: 14px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .gal-legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(5,7,9,0.7);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 7px 11px;
      border-radius: 8px;
      font-size: 0.73rem;
      color: rgba(255,255,255,0.7);
      backdrop-filter: blur(8px);
      white-space: nowrap;
    }
    .gal-legend-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-mec { background: #C9A84C; box-shadow: 0 0 5px #C9A84C88; }
    .dot-med { background: #1B6B3A; box-shadow: 0 0 5px #1B6B3A88; }

    /* ===== PANNEAU DROIT : zoom ===== */
    .gal-zoom-panel {
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }
    .gal-zoom-btn {
      background: rgba(5,7,9,0.75);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8);
      width: 38px;
      height: 38px;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
    }
    .gal-zoom-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    #gal-zoom-val {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.45);
      text-align: center;
      line-height: 1;
      padding: 3px 0;
      font-family: 'Poppins', sans-serif;
    }
    .gal-zoom-sep {
      width: 30px;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    /* ===== SEARCHBAR bas ===== */
    .gal-search-bar {
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0;
      width: min(380px, 90vw);
    }
    .gal-search-icon {
      position: absolute;
      left: 13px;
      color: rgba(255,255,255,0.4);
      font-size: 0.9rem;
      pointer-events: none;
    }
    #gal-search {
      width: 100%;
      background: rgba(8,14,20,0.88);
      border: 1px solid rgba(255,255,255,0.14);
      color: #fff;
      padding: 11px 40px 11px 36px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-family: 'Poppins', sans-serif;
      backdrop-filter: blur(12px);
      outline: none;
      transition: border-color 0.2s;
    }
    #gal-search::placeholder { color: rgba(255,255,255,0.3); }
    #gal-search:focus { border-color: rgba(201,168,76,0.6); }
    #gal-search-clear {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 1rem;
      cursor: pointer;
      padding: 4px;
      display: none;
    }
    #gal-search-clear.visible { display: block; }

    /* ===== HINT ===== */
    .gal-hint {
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(5,7,9,0.6);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 50px;
      padding: 6px 16px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
      backdrop-filter: blur(8px);
      white-space: nowrap;
      pointer-events: none;
      animation: hint-fade 6s ease forwards;
    }
    @keyframes hint-fade {
      0%   { opacity: 0; transform: translateX(-50%) translateY(4px); }
      10%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ===== LOADING ===== */
    #gal-loading {
      position: fixed;
      inset: 0;
      background: #050709;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      transition: opacity 0.6s;
    }
    #gal-loading.hidden { opacity: 0; pointer-events: none; }
    .gal-loader-icon {
      font-size: 2.5rem;
      animation: spin-slow 4s linear infinite;
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    #gal-loading p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.08em;
    }

    /* ===== RESPONSIVE MOBILE ===== */
    @media (max-width: 600px) {
      .gal-legend { display: none; }
      .gal-zoom-panel { right: 8px; }
      .gal-zoom-btn { width: 34px; height: 34px; font-size: 1rem; }
      .gal-title h1 { font-size: 0.88rem; }
      .gal-back { padding: 6px 10px; font-size: 0.78rem; }
    }
  </style>
</head>
<body>

<!-- ===== ÉCRAN DE CHARGEMENT ===== -->
<div id="gal-loading">
  <div class="gal-loader-icon">🌌</div>
  <p>Génération de la galaxie…</p>
</div>

<!-- ===== CANVAS PRINCIPAL ===== -->
<canvas id="galaxy-canvas"></canvas>

<!-- ===== TOPBAR ===== -->
<div class="gal-overlay gal-topbar">
  <!-- Retour -->
  <a href="../../index.html" class="gal-back">
    ← Accueil
  </a>

  <!-- Titre -->
  <div class="gal-title">
    <h1>🌌 Galaxie des Sourates</h1>
    <div class="gal-subtitle">114 planètes • Coran interactif</div>
  </div>

  <!-- Pause rotation -->
  <button class="gal-pause-btn" id="gal-pause" title="Pause / Reprendre la rotation">⏸</button>
</div>

<!-- ===== LÉGENDE (gauche) ===== -->
<div class="gal-overlay gal-legend">
  <div class="gal-legend-item">
    <div class="gal-legend-dot dot-mec"></div>
    Mecquoise (86)
  </div>
  <div class="gal-legend-item">
    <div class="gal-legend-dot dot-med"></div>
    Médinoise (28)
  </div>
  <div class="gal-legend-item" style="flex-direction:column; align-items:flex-start; gap:4px; padding:8px 11px;">
    <span style="color:rgba(255,255,255,0.45); font-size:0.68rem; margin-bottom:2px;">Taille = nbre de versets</span>
    <div style="display:flex;gap:5px;align-items:center;">
      <div style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.3);"></div>
      <div style="width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.3);"></div>
      <div style="width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.3);"></div>
    </div>
  </div>
</div>

<!-- ===== CONTRÔLES ZOOM (droite) ===== -->
<div class="gal-overlay gal-zoom-panel">
  <button class="gal-zoom-btn" id="gal-zoom-in" title="Zoom avant">+</button>
  <span id="gal-zoom-val">100%</span>
  <div class="gal-zoom-sep"></div>
  <button class="gal-zoom-btn" id="gal-zoom-reset" title="Réinitialiser la vue" style="font-size:0.75rem;">⌂</button>
  <div class="gal-zoom-sep"></div>
  <button class="gal-zoom-btn" id="gal-zoom-out" title="Zoom arrière">−</button>
</div>

<!-- ===== HINT ===== -->
<div class="gal-overlay gal-hint" id="gal-hint">
  🖱 Survol pour info • Clic pour lire • Molette pour zoomer • Glisser pour naviguer
</div>

<!-- ===== SEARCHBAR ===== -->
<div class="gal-overlay gal-search-bar" style="position:fixed;">
  <span class="gal-search-icon">🔍</span>
  <input type="search" id="gal-search" placeholder="Sourate… (ex: Al-Fatiha, 2, باقرة)" autocomplete="off" autocorrect="off" spellcheck="false" />
  <button id="gal-search-clear" title="Effacer">✕</button>
</div>

<!-- ===== SCRIPTS ===== -->
<script src="../../assets/js/surahs-data.js"></script>
<script src="../../assets/js/tracker.js"></script>
<script src="../../assets/js/galaxy.js"></script>
<script>
  /* Masquer le loading dès que la galaxie est prête */
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      const loader = document.getElementById('gal-loading');
      if (loader) {
        loader.classList.add('hidden');
        setTimeout(() => loader.remove(), 700);
      }
    }, 600);

    /* Clear button dans la recherche */
    const input = document.getElementById('gal-search');
    const clearBtn = document.getElementById('gal-search-clear');
    if (input && clearBtn) {
      input.addEventListener('input', () => {
        clearBtn.classList.toggle('visible', input.value.length > 0);
      });
      clearBtn.addEventListener('click', () => {
        input.value = '';
        clearBtn.classList.remove('visible');
        input.focus();
      });
    }

    /* Masquer hint après animation */
    const hint = document.getElementById('gal-hint');
    if (hint) setTimeout(() => hint.remove(), 6500);
  });
</script>

</body>
</html>
